services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/database:/app/database
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      - backend
    restart: unless-stopped
